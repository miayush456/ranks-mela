<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Units and Measurements - PYQ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .question-number {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #4a90e2;
            background: white;
            color: #333;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }

        .option-btn:hover {
            background-color: #eaf1fb;
        }

        .option-btn.correct {
            background-color: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .option-btn.wrong {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .result {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .result.correct { color: #27ae60; }
        .result.wrong { color: #e74c3c; }

        .nav-btns {
            display: flex;
            justify-content: space-between;
        }

        .nav-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn {
            background-color: #95a5a6;
            color: white;
        }

        .back-btn:hover { background-color: #7f8c8d; }

        .next-btn {
            background-color: #4a90e2;
            color: white;
        }

        .next-btn:hover { background-color: #2c6fba; }
    </style>
</head>
<body>

<div class="quiz-box">
    <div class="question-number" id="qNumber"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="result" id="result"></div>
    <div class="nav-btns">
        <button class="nav-btn back-btn" onclick="navigate(-1)">⬅ Back</button>
        <button class="nav-btn next-btn" onclick="navigate(1)">Next ➡</button>
    </div>
</div>

<script>
    const STORAGE_KEY = "units_measurements_answers";

    const questions = [
        {
            q: "The SI unit of luminous intensity is?",
            options: ["Lumen", "Candela", "Lux", "Watt"],
            answer: 1
        },
        {
            q: "Which of the following is a dimensionless quantity?",
            options: ["Force", "Strain", "Velocity", "Pressure"],
            answer: 1
        },
        {
            q: "1 Angstrom is equal to?",
            options: ["10⁻⁶ m", "10⁻⁹ m", "10⁻¹⁰ m", "10⁻¹² m"],
            answer: 2
        },
        {
            q: "The dimensional formula of power is?",
            options: ["[ML²T⁻²]", "[ML²T⁻³]", "[MLT⁻²]", "[ML³T⁻³]"],
            answer: 1
        },
        {
            q: "Which of the following pairs have the same dimensions?",
            options: ["Work and Power", "Torque and Energy", "Force and Momentum", "Impulse and Pressure"],
            answer: 1
        },
        {
            q: "The number of significant figures in 0.00340 is?",
            options: ["5", "6", "3", "2"],
            answer: 2
        },
        {
            q: "Which instrument has the least count of 0.001 mm?",
            options: ["Screw Gauge", "Vernier Caliper", "Meter Scale", "Micrometer"],
            answer: 3
        },
        {
            q: "The dimensional formula of gravitational constant G is?",
            options: ["[M⁻¹L³T⁻²]", "[ML³T⁻²]", "[M⁻¹L²T⁻²]", "[ML²T⁻²]"],
            answer: 0
        },
        {
            q: "Light year is a unit of?",
            options: ["Time", "Speed", "Distance", "Energy"],
            answer: 2
        },
        {
            q: "Which of the following is NOT a fundamental unit in SI system?",
            options: ["Kelvin", "Mole", "Newton", "Candela"],
            answer: 2
        }
    ];

    let current = 0;

    // localStorage se answers load karo
    let userAnswers = JSON.parse(localStorage.getItem(STORAGE_KEY)) || new Array(questions.length).fill(null);

    function saveAnswers() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
    }

    function loadQuestion() {
        const q = questions[current];
        document.getElementById('qNumber').textContent = `Question ${current + 1} of ${questions.length}`;
        document.getElementById('question').textContent = q.q;
        document.getElementById('result').textContent = '';
        document.getElementById('result').className = 'result';

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });

        // agar pehle answer diya tha toh restore karo
        if (userAnswers[current] !== null) {
            const saved = userAnswers[current];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (saved === q.answer) {
                buttons[saved].classList.add('correct');
                document.getElementById('result').textContent = '✅ Correct Answer!';
                document.getElementById('result').className = 'result correct';
            } else {
                buttons[saved].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                document.getElementById('result').textContent = '❌ Wrong Answer!';
                document.getElementById('result').className = 'result wrong';
            }
        }
    }

    function checkAnswer(selected) {
        if (userAnswers[current] !== null) return;

        const q = questions[current];
        userAnswers[current] = selected;
        saveAnswers(); // localStorage mein save karo

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selected === q.answer) {
            buttons[selected].classList.add('correct');
            document.getElementById('result').textContent = '✅ Correct Answer!';
            document.getElementById('result').className = 'result correct';
        } else {
            buttons[selected].classList.add('wrong');
            buttons[q.answer].classList.add('correct');
            document.getElementById('result').textContent = '❌ Wrong Answer!';
            document.getElementById('result').className = 'result wrong';
        }
    }

    function navigate(dir) {
        current += dir;
        if (current < 0) current = 0;
        if (current >= questions.length) current = questions.length - 1;
        loadQuestion();
    }

    loadQuestion();
</script>

</body>
</html>
