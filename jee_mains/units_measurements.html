<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Units and Measurements - PYQ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .quiz-box {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .question-number {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
        }

        .question {
            font-size: 1.2rem;
            font-weight: bold;
            color: #222;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .option-btn {
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #4a90e2;
            background: white;
            color: #333;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            text-align: left;
        }

        .option-btn:hover {
            background-color: #eaf1fb;
        }

        .option-btn.correct {
            background-color: #27ae60;
            color: white;
            border-color: #27ae60;
        }

        .option-btn.wrong {
            background-color: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }

        .result {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 24px;
        }

        .result.correct { color: #27ae60; }
        .result.wrong { color: #e74c3c; }

        /* ✅ NAYA: Explanation box */
        .explanation {
            background: #f0f7ff;
            border-left: 4px solid #4a90e2;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
            display: none;
        }

        .nav-btns {
            display: flex;
            justify-content: space-between;
        }

        .nav-btn {
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn {
            background-color: #95a5a6;
            color: white;
        }

        .back-btn:hover { background-color: #7f8c8d; }

        .next-btn {
            background-color: #4a90e2;
            color: white;
        }

        .next-btn:hover { background-color: #2c6fba; }
    </style>
</head>
<body>

<div class="quiz-box">
    <div class="question-number" id="qNumber">Loading...</div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="result" id="result"></div>
    <div class="explanation" id="explanation"></div>
    <div class="nav-btns">
        <button class="nav-btn back-btn" onclick="navigate(-1)">⬅ Back</button>
        <button class="nav-btn next-btn" onclick="navigate(1)">Next ➡</button>
    </div>
</div>

<script>
    const STORAGE_KEY = "units_measurements_answers";

    // ✅ CHANGE 1: questions array ab khaali hai — JSON se bharega
    let questions = [];
    let current = 0;
    let userAnswers = [];

    // ✅ CHANGE 2: JSON file se questions load karo
    async function loadQuestions() {
        try {
            const response = await fetch('data/units_measurements.json');
            questions = await response.json();

            // localStorage se purane answers lo, nahi toh naye banao
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                userAnswers = JSON.parse(saved);
            } else {
                userAnswers = new Array(questions.length).fill(null);
            }

            loadQuestion(); // questions aane ke baad pehla question dikhao

        } catch (error) {
            document.getElementById('qNumber').textContent = '❌ Error!';
            document.getElementById('question').textContent =
                'Questions load nahi hue. "data" folder aur JSON file check karo.';
        }
    }

    function saveAnswers() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(userAnswers));
    }

    // ✅ CHANGE 3: q.q ki jagah q.question likha (JSON format ke hisaab se)
    function loadQuestion() {
        const q = questions[current];
        if (!q) return;

        document.getElementById('qNumber').textContent =
            `Question ${current + 1} of ${questions.length}` +
            (q.year ? `  |  📅 ${q.year}` : '');

        document.getElementById('question').textContent = q.question; // ← q.q se q.question
        document.getElementById('result').textContent = '';
        document.getElementById('result').className = 'result';
        document.getElementById('explanation').style.display = 'none';

        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';

        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.textContent = opt;
            btn.onclick = () => checkAnswer(i);
            optionsDiv.appendChild(btn);
        });

        // agar pehle answer diya tha toh restore karo
        if (userAnswers[current] !== null) {
            const saved = userAnswers[current];
            const buttons = document.querySelectorAll('.option-btn');
            buttons.forEach(btn => btn.disabled = true);

            if (saved === q.answer) {
                buttons[saved].classList.add('correct');
                document.getElementById('result').textContent = '✅ Correct Answer!';
                document.getElementById('result').className = 'result correct';
            } else {
                buttons[saved].classList.add('wrong');
                buttons[q.answer].classList.add('correct');
                document.getElementById('result').textContent = '❌ Wrong Answer!';
                document.getElementById('result').className = 'result wrong';
            }

            // explanation bhi dikhao
            if (q.explanation) {
                document.getElementById('explanation').textContent = '💡 ' + q.explanation;
                document.getElementById('explanation').style.display = 'block';
            }
        }
    }

    function checkAnswer(selected) {
        if (userAnswers[current] !== null) return;

        const q = questions[current];
        userAnswers[current] = selected;
        saveAnswers();

        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);

        if (selected === q.answer) {
            buttons[selected].classList.add('correct');
            document.getElementById('result').textContent = '✅ Correct Answer!';
            document.getElementById('result').className = 'result correct';
        } else {
            buttons[selected].classList.add('wrong');
            buttons[q.answer].classList.add('correct');
            document.getElementById('result').textContent = '❌ Wrong Answer!';
            document.getElementById('result').className = 'result wrong';
        }

        // ✅ Explanation dikhao
        if (q.explanation) {
            document.getElementById('explanation').textContent = '💡 ' + q.explanation;
            document.getElementById('explanation').style.display = 'block';
        }
    }

    function navigate(dir) {
        current += dir;
        if (current < 0) current = 0;
        if (current >= questions.length) current = questions.length - 1;
        loadQuestion();
    }

    // ✅ CHANGE 4: loadQuestion() ki jagah loadQuestions() — JSON fetch shuru karega
    loadQuestions();
</script>

</body>
</html>
